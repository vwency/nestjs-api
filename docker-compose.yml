services:
  postgres:
    build:
      context: .
      dockerfile: database/Dockerfile
    image: ghcr.io/vwency/nestjs-api/pg:b78c388
    restart: always
    shm_size: 128mb
    
    environment:
      POSTGRES_USERNAME: ${DATABASE_USERNAME}
      DATABASE_NAME: ${DATABASE_NAME}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      PGDATA: ${PGDATA}
      PGPORT: ${DATABASE_PORT}
      TZ: "Europe/Moscow"
      
    ports:
      - "${DATABASE_PORT}:${DATABASE_PORT}"
    container_name: "postgres"
    volumes:
      - pg_data:${PGDATA}
    networks:
      - backend
      
    logging:
      driver: "json-file" 
      options:
        max-size: "1m"  
        max-file: "3" 
        
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $DATABASE_USERNAME"]
      interval: 30s
      timeout: 10s
      retries: 5        
      start_period: 5s
    resources:
      limits:
        memory: 1024m    
        cpus: "4"     
      reservations:
        memory: 256m    
        cpus: "1"    
      

  nestjs:
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/vwency/nestjs-api/nest-api:b78c388
    env_file:
      - prod.env
    enviroment:
      TZ: "Europe/Moscow"
    
    ports:
      - "${BACKEND_PORT}:${BACKEND_PORT}"  
    depends_on:
      - postgres 
    container_name: "nestjs-app"
    networks:
      - backend
      
    restart: always
    
    restart_policy:
      condition: on-failure 
      delay: 5s            
      max_attempts: 3       
      window: 120s         

    logging:
      driver: "json-file" 
      options:
        max-size: "1m"  
        max-file: "3" 
    resources:
      limits:
        memory: 1024m    
        cpus: "4"     
      reservations:
        memory: 256m    
        cpus: "1"  
        
    sysctls:
      net.core.somaxconn: 1024
      net.ipv4.tcp_syncookies: 1


volumes:
  pg_data:

networks:
  backend:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 192.168.100.0/24


